[coverage:run]
branch = true
parallel = true
source =
  packages/griffelib/src/griffe
  packages/griffecli/src/griffecli
  packages/griffecli/tests/
  packages/griffelib/tests/

[coverage:paths]
equivalent =
  src/
  .venv/lib/*/site-packages/
  .venvs/*/lib/*/site-packages/

[coverage:report]
precision = 2
omit =
  src/*/__init__.py
  src/*/__main__.py
  packages/*/tests/__init__.py
  packages/*/tests/tmp/*
exclude_lines =
  pragma: no cover
  if TYPE_CHECKING

[coverage:json]
output = htmlcov/coverage.json
